name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies (vcpkg)
        run: |
          vcpkg install dav1d:x64-windows
          echo "PKG_CONFIG_PATH=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\pkgconfig" >> $env:GITHUB_ENV
      - name: Check (compile test)
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev libxdo-dev \
            libdav1d-dev nasm \
            libpulse-dev libopus-dev libasound2-dev
      - name: Build WASM (needed for server)
        run: |
          cargo install wasm-pack
          wasm-pack build crates/web --target web --no-typescript
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Doc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - name: Test
        run: cargo test --workspace
