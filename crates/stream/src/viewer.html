<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>👻 Phantom Stream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { max-width: 100vw; max-height: 100vh; object-fit: contain; }
  #hud {
    position: fixed; top: 12px; right: 12px; z-index: 10;
    background: rgba(0,0,0,0.75); padding: 10px 14px; border-radius: 8px;
    font-size: 12px; line-height: 1.5;
  }
  #hud .val { color: #4fc3f7; }
  #status { position: fixed; top: 12px; left: 12px; font-size: 14px; z-index: 10; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="status">Connecting...</div>
<div id="hud">
  <div>FPS: <span class="val" id="fps">-</span></div>
  <div>Frames: <span class="val" id="frames">-</span></div>
  <div>Size: <span class="val" id="size">-</span></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wsPort = parseInt(location.port) + 1;
const wsUrl = `ws://${location.hostname}:${wsPort}`;

let decoder = null;
let frameCount = 0;
let fpsCount = 0;
let lastFpsTime = performance.now();

// Try WebCodecs H.264 decode
function initDecoder(width, height) {
  if (decoder) decoder.close();

  canvas.width = width;
  canvas.height = height;

  decoder = new VideoDecoder({
    output: (frame) => {
      ctx.drawImage(frame, 0, 0);
      frame.close();
      fpsCount++;
    },
    error: (e) => {
      console.error('Decode error:', e);
    }
  });

  decoder.configure({
    codec: 'avc1.64001f', // H.264 High Profile Level 3.1
    optimizeForLatency: true,
  });
}

function connect() {
  document.getElementById('status').textContent = '⏳ Connecting...';
  const ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    document.getElementById('status').textContent = '🟢 Connected';
    document.getElementById('status').style.color = '#66bb6a';
  };

  ws.onmessage = (event) => {
    const data = new Uint8Array(event.data);

    // If WebCodecs not available, show raw frame count
    if (typeof VideoDecoder === 'undefined') {
      frameCount++;
      document.getElementById('frames').textContent = frameCount;
      document.getElementById('size').textContent = `${(data.length / 1024).toFixed(1)} KB`;
      return;
    }

    // Initialize decoder on first frame (assume 1920x1080 default)
    if (!decoder) {
      initDecoder(1920, 1080);
    }

    // Feed H.264 NAL units to decoder
    try {
      const chunk = new EncodedVideoChunk({
        type: frameCount === 0 ? 'key' : 'delta',
        timestamp: frameCount * 33333, // ~30fps
        data: data,
      });
      decoder.decode(chunk);
    } catch (e) {
      console.warn('decode skip:', e.message);
    }

    frameCount++;
    document.getElementById('frames').textContent = frameCount;
    document.getElementById('size').textContent = `${(data.length / 1024).toFixed(1)} KB`;
  };

  ws.onclose = () => {
    document.getElementById('status').textContent = '⏹ Stream ended';
    document.getElementById('status').style.color = '#aaa';
  };

  ws.onerror = () => {
    document.getElementById('status').textContent = '🔴 Error';
    document.getElementById('status').style.color = '#ef5350';
    setTimeout(connect, 2000);
  };
}

// FPS counter
setInterval(() => {
  const now = performance.now();
  const elapsed = (now - lastFpsTime) / 1000;
  document.getElementById('fps').textContent = Math.round(fpsCount / elapsed);
  fpsCount = 0;
  lastFpsTime = now;
}, 1000);

connect();
</script>
</body>
</html>
