[package]
name = "phantom-server"
version = "0.1.0"
edition = "2021"

# Future feature flags for additional encoders:
# [features]
# default = ["openh264-encoder"]
# openh264-encoder = ["openh264"]
# ffmpeg-encoder = ["ffmpeg-next"]  # enables x264, NVENC, VAAPI, AV1

[dependencies]
phantom-core = { path = "../core" }
anyhow = "1"
bincode = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
scrap = "0.5"
zstd = "0.13"
clap = { version = "4", features = ["derive"] }
quinn = "0.11"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
rcgen = "0.13"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
ring = "0.17"
tungstenite = "0.24"
enigo = "0.3"
arboard = "3"
openh264 = "0.6"
