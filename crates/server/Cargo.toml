[package]
name = "phantom-server"
version = "0.1.0"
edition = "2021"

[features]
default = ["web-client"]
web-client = []  # embed WASM web client (requires wasm-pack build first)

[dependencies]
phantom-core = { path = "../core" }
anyhow = "1"
bincode = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
scrap = "0.5"
zstd = "0.13"
clap = { version = "4", features = ["derive"] }
quinn = "0.11"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
rcgen = "0.13"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
ring = "0.17"
tungstenite = "0.24"
str0m = "0.18"
serde_json = "1"
enigo = "0.3"
arboard = "3"
openh264 = "0.6"
phantom-gpu = { path = "../gpu" }
