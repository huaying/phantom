<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Phantom Remote Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <canvas id="screen" tabindex="0"></canvas>
  <script type="module">
    import init from './phantom_web.js';
    // Focus canvas immediately so Chrome considers tab active
    // (hardware WebCodecs decoder defers output if tab unfocused)
    document.getElementById('screen').focus();
    try { await init(); } catch(e) { console.error('WASM init failed:', e); }
  </script>
</body>
</html>
